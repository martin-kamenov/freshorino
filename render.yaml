services:
  - type: web
    name: freshorino-pos
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /opt/render/project/src/store.db
    disk:
      name: freshorino-data
      mountPath: /opt/render/project/src
      sizeGB: 1
