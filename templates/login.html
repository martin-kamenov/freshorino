<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Freshorino — Вход</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D1F0D;--panel:#1C2E1C;--border:rgba(124,181,24,.2);--green:#7CB518;--green2:#9DD624;--text:#EDF5E0;--text2:#9DB88A;--text3:#637A55;--red:#E8502A}
body{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;background-image:radial-gradient(ellipse 80% 80% at 50% -10%,rgba(124,181,24,.12),transparent)}
.login-wrap{width:100%;max-width:380px;padding:16px}
.login-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:36px 32px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.logo-area{text-align:center;margin-bottom:28px}
.logo-area img{width:80px;height:80px;border-radius:50%;object-fit:cover;margin-bottom:12px}
.logo-name{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--green2)}
.logo-sub{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:6px}
.form-input{width:100%;background:#142014;border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;transition:border-color .2s}
.form-input:focus{outline:none;border-color:var(--green)}
.btn{width:100%;padding:12px;background:var(--green);color:#000;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;border:none;border-radius:8px;cursor:pointer;transition:background .2s;margin-top:6px}
.btn:hover{background:var(--green2)}
.error{background:rgba(232,80,42,.12);border:1px solid rgba(232,80,42,.3);border-radius:8px;padding:10px 14px;color:var(--red);font-size:13px;margin-bottom:16px}
.hint{text-align:center;font-size:11.5px;color:var(--text3);margin-top:18px}
.hint code{background:rgba(124,181,24,.1);color:var(--green2);padding:2px 6px;border-radius:4px;font-size:11px}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo-area">
      <img src="/static/images/logo.png" alt="Freshorino" onerror="this.style.display='none'">
      <div class="logo-name">Freshorino</div>
      <div class="logo-sub">Плод и Зеленчук — Sofia</div>
    </div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <div class="form-group">
      <label class="form-label">Потребителско Име</label>
      <input class="form-input" id="uname" type="text" placeholder="admin" autocomplete="username" autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Парола</label>
      <input class="form-input" id="upwd" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Вход →</button>
    <div class="hint">По подразбиране: <code>admin</code> / <code>admin123</code></div>
  </div>
</div>
<script>
document.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin() });
async function doLogin(){
  const btn=document.getElementById('loginBtn');
  btn.textContent='...'; btn.disabled=true;
  const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:document.getElementById('uname').value,
                         password:document.getElementById('upwd').value})});
  const d=await r.json();
  if(d.ok){ window.location=d.redirect }
  else{ btn.textContent='Вход →'; btn.disabled=false;
    let err=document.querySelector('.error');
    if(!err){err=document.createElement('div');err.className='error';
      document.querySelector('.login-card').insertBefore(err,document.querySelector('.form-group'));}
    err.textContent=d.error; }
}
</script>
</body>
</html>
